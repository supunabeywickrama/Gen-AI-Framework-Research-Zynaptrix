<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circuit-like icon -->
  <g transform="translate(10, 15)">
    <!-- Central node -->
    <circle cx="25" cy="25" r="8" fill="url(#brandGradient)" />
    
    <!-- Connection lines -->
    <line x1="25" y1="25" x2="10" y2="10" stroke="#1976D2" stroke-width="2" />
    <line x1="25" y1="25" x2="40" y2="10" stroke="#1976D2" stroke-width="2" />
    <line x1="25" y1="25" x2="10" y2="40" stroke="#1976D2" stroke-width="2" />
    <line x1="25" y1="25" x2="40" y2="40" stroke="#1976D2" stroke-width="2" />
    
    <!-- Peripheral nodes -->
    <circle cx="10" cy="10" r="4" fill="#1976D2" />
    <circle cx="40" cy="10" r="4" fill="#1976D2" />
    <circle cx="10" cy="40" r="4" fill="#1976D2" />
    <circle cx="40" cy="40" r="4" fill="#1976D2" />
    
    <!-- AI spark effect -->
    <path d="M 25 17 L 27 20 L 25 23" stroke="#FFD700" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Brand text -->
  <text x="75" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#brandGradient)">
    ZYNAPTRIX
  </text>
  
  <!-- Tagline -->
  <text x="75" y="58" font-family="Arial, sans-serif" font-size="11" fill="#666">
    Industrial Copilot Platform
  </text>
</svg>
