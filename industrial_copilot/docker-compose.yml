version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: factory_influx
    ports:
      - "8086:8086"
    env_file:
      - backend/.env
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=${DOCKER_INFLUXDB_INIT_MODE:-setup}
      - DOCKER_INFLUXDB_INIT_USERNAME=${DOCKER_INFLUXDB_INIT_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${DOCKER_INFLUXDB_INIT_PASSWORD:-adminpassword}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-factory}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-machine_sensors}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_API_KEY}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_api
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - INFLUX_URL=http://influxdb:8086
    command: uvicorn api.main_api:app --host 0.0.0.0 --port 8000
    depends_on:
      - influxdb

  dashboard:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_dashboard
    ports:
      - "8501:8501"
    env_file:
      - backend/.env
    environment:
      - API_URL=http://api:8000
    command: streamlit run dashboard/streamlit_dashboard.py --server.address=0.0.0.0
    depends_on:
      - api

  simulator:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_simulator
    env_file:
      - backend/.env
    environment:
      - INFLUX_URL=http://influxdb:8086
      - API_URL=http://api:8000
    command: python simulator/sensor_simulator.py
    depends_on:
      - influxdb
      - api

  listener:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_listener
    env_file:
      - backend/.env
    environment:
      - INFLUX_URL=http://influxdb:8086
      - API_URL=http://api:8000
    command: python ingestion/stream_listener.py
    depends_on:
      - influxdb
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: factory_frontend
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env
    depends_on:
      - api

volumes:
  influxdb_data:
  influxdb_config:
